<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <!-- Glow and Gradients -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- Purple -->
      <stop offset="50%" stop-color="#3b82f6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Emerald -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer mainframe frame -->
  <rect x="4" y="2" width="40" height="44" rx="6" fill="#09090b" stroke="#27272a" stroke-width="2"/>
  
  <!-- Inner Glass Panel -->
  <rect x="8" y="6" width="32" height="36" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>

  <!-- Futuristic Mainframe geometric patterns (IBM z-series inspired) -->
  <path d="M12 10 L36 10 L28 22 L12 22 Z" fill="url(#neonGrad)" opacity="0.15" />
  <path d="M12 26 L28 26 L36 38 L12 38 Z" fill="url(#neonGrad)" opacity="0.15" />

  <!-- Diagonal Glowing Accent Lines -->
  <path d="M14 12 L26 24 M22 24 L34 36" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M18 12 L30 24 M26 24 L38 36" stroke="url(#neonGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Server/Mainframe tape reel or CPU indicator in the background -->
  <circle cx="16" cy="30" r="3" stroke="#27272a" stroke-width="1" />
  <circle cx="16" cy="30" r="1.5" fill="#3f3f46" />
  
  <circle cx="24" cy="30" r="3" stroke="#27272a" stroke-width="1" />
  <circle cx="24" cy="30" r="1.5" fill="#3f3f46" />

  <!-- Status indicators (LEDs) -->
  <circle cx="12" cy="8" r="1" fill="#ef4444" /> <!-- Red status -->
  <circle cx="15" cy="8" r="1" fill="#10b981" /> <!-- Green active -->
  <circle cx="18" cy="8" r="1" fill="#3b82f6" /> <!-- Blue link -->

  <circle cx="36" cy="8" r="1" fill="#10b981" filter="url(#glow)"/> <!-- Flashing green -->
  <circle cx="33" cy="8" r="1" fill="#f59e0b" /> <!-- Yellow warning -->
  
  <!-- Cooling Vents at the bottom -->
  <rect x="12" y="38" width="24" height="2" rx="0.5" fill="#27272a" />
</svg>